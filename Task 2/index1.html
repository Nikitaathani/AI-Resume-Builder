<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamic Prompt Builder</title>

<style>
@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}
</style>

</head>

<body style="
margin:0;
font-family:'Segoe UI',sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(
135deg,
#ff6b6b 0%,
#ff9f43 20%,
#feca57 40%,
#48dbfb 60%,
#5f27cd 80%,
#ff6b6b 100%
);
background-size:400% 400%;
animation:gradientMove 12s ease infinite;
">

<div style="
width:750px;
background:white;
border-radius:30px;
padding:40px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
color:#1e293b;
">

<div style="text-align:center;margin-bottom:30px;">

<h1 style="
font-size:42px;
margin:0;
color:#1e293b;
">
✨ Dynamic Prompt Builder
</h1>

<p style="
font-size:18px;
color:#64748b;
margin-top:10px;
">
Transform Ideas into AI-Ready Prompts
</p>

</div>

<label style="
font-weight:bold;
display:block;
margin-bottom:8px;
">
🚀 Project Name
</label>

<input
id="project"
type="text"
placeholder="Inventory Management System"
style="
width:100%;
padding:16px;
border:2px solid #e2e8f0;
border-radius:15px;
margin-bottom:20px;
font-size:16px;
box-sizing:border-box;
outline:none;
"
/>

<label style="
font-weight:bold;
display:block;
margin-bottom:8px;
">
💡 Skills Used
</label>

<textarea
id="skills"
placeholder="Python, FastAPI, React, SQL"
style="
width:100%;
height:120px;
padding:16px;
border:2px solid #e2e8f0;
border-radius:15px;
font-size:16px;
resize:none;
box-sizing:border-box;
outline:none;
"
></textarea>

<button
onclick="buildPrompt()"
style="
width:100%;
padding:16px;
margin-top:25px;
border:none;
border-radius:15px;
background:linear-gradient(
90deg,
#ff6b6b,
#ff9f43,
#feca57,
#48dbfb,
#5f27cd
);
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
box-shadow:0 8px 25px rgba(95,39,205,0.4);
"
>
⚡ Generate Prompt
</button>

<div
id="output"
style="
display:none;
margin-top:25px;
background:#f8fafc;
border-left:5px solid #5f27cd;
padding:20px;
border-radius:15px;
white-space:pre-wrap;
font-size:16px;
line-height:1.6;
"
>
</div>

</div>

<script>
async function buildPrompt() {

    const project = document.getElementById("project").value;
    const skills = document.getElementById("skills").value;

    const response = await fetch("http://127.0.0.1:8000/build-prompt", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            project: project,
            skills: skills
        })
    });

    const data = await response.json();

    const output = document.getElementById("output");

    output.style.display = "block";

    output.innerHTML = `
        <h2 style="margin-top:0;color:#5f27cd;">
            🤖 Generated Prompt
        </h2>
        <hr>
        <pre style="white-space:pre-wrap;font-family:inherit;">
${data.prompt}
        </pre>
    `;
}
</script>

</body>
</html>
